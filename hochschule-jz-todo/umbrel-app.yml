gallery:
  - https://raw.githubusercontent.com/hochschule-jz/umbrel-app-store/main/hochschule-jz-todo/icon.png
releaseNotes: >-
  This release makes Web Push reminder notifications more reliable:


  • New "Send test" button in Settings to instantly check that push
  notifications are working on this device.


  • Clearer guidance when push isn't available — it now tells you exactly why
  (insecure connection, or that on iOS the app must be added to the Home Screen).


  • Reminder notifications now include the task's list name, and re-alert when a
  reminder changes.


  • More reliable delivery — the app automatically re-subscribes if your browser
  rotates its push subscription, and prunes stale subscriptions.


  This update is code-only; your existing tasks and data are untouched.
